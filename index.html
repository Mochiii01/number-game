<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess Number Game 高级版</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🎮 猜数字游戏 高级版</h1>
    <p>猜一个 <b>1 到 10</b> 的数字</p>

    <input type="number" id="guess" placeholder="输入数字">
    <button id="submitBtn">提交</button>
    <button id="resetBtn">重置游戏</button>

    <p id="feedback"></p>
    <p id="attempts">次数: 0</p>
</div>

<script src="script.js"></script>
</body>
</html>
